---
apiVersion: v1
kind: Namespace
metadata:
  name: inference
  labels:
    pod-security.kubernetes.io/enforce: baseline

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: inference
data:
  MODEL_ID: "microsoft/Phi-3-mini-4k-instruct"
  MAX_INPUT_LENGTH: "2048"
  MAX_TOTAL_TOKENS: "4096"
  NUM_SHARD: "1"
  QUANTIZE: "bitsandbytes-nf4"  # 4-bit quantization for efficiency

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gpu
  namespace: inference
  labels:
    app: inference
    mode: gpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
      mode: gpu
  template:
    metadata:
      labels:
        app: inference
        mode: gpu
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4

      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

      containers:
      - name: inference
        image: ghcr.io/huggingface/text-generation-inference:2.0

        ports:
        - containerPort: 80
          name: http
          protocol: TCP

        env:
        - name: MODEL_ID
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: MODEL_ID
        - name: MAX_INPUT_LENGTH
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: MAX_INPUT_LENGTH
        - name: MAX_TOTAL_TOKENS
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: MAX_TOTAL_TOKENS
        - name: NUM_SHARD
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: NUM_SHARD
        - name: QUANTIZE
          valueFrom:
            configMapKeyRef:
              name: inference-config
              key: QUANTIZE
        - name: HUGGING_FACE_HUB_TOKEN
          value: ""

        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
          limits:
            memory: "16Gi"
            cpu: "6"
            nvidia.com/gpu: "1"

        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 150
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: model-cache
          mountPath: /data
        - name: shm
          mountPath: /dev/shm

      volumes:
      - name: model-cache
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: inference
  labels:
    app: inference
spec:
  type: ClusterIP
  selector:
    app: inference
    mode: gpu
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-hpa
  namespace: inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-gpu
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
